on:
  push:
    branches: main
  workflow_dispatch:

name: Render and Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0'
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev \
            libfontconfig1-dev libharfbuzz-dev libfribidi-dev \
            libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev

      - name: Install pak
        run: install.packages("pak", repos = "https://r-lib.github.io/p/pak/stable/")
        shell: Rscript {0}

      - name: Install R packages
        run: |
          pak::pkg_install(c(
            "tidyverse", "knitr", "kableExtra",
            "lme4", "nlme", "lmerTest", "broom.mixed",
            "performance", "ggeffects", "parameters",
            "ggplot2", "patchwork", "viridis", "corrplot", "ggpubr",
            "plm", "AER", "ivreg", "rdrobust", "MatchIt", "sandwich", "lmtest",
            "lavaan", "semTools",
            "glmmTMB",
            "survival", "survminer",
            "mice", "miceadds",
            "broom", "car", "Matrix", "MASS"
          ))
        shell: Rscript {0}

      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
