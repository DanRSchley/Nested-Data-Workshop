project:
  type: book
  output-dir: docs

book:
  title: "Nested Data Structures"
  subtitle: "A Workshop on Multilevel Modeling · RSM"
  author: "Dan Schley"
  date: today
  repo-url: https://github.com/DanRSchley/Nested-Data-Workshop
  repo-actions: [issue]
  sidebar:
    style: docked
    background: light
