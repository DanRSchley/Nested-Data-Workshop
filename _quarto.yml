        - module-0/part3.qmd
        - module-0/part4.qmd
    - part: "Module 1: The Mixed-Effects Framework"
      chapters:
        - module-1/intro.qmd
        - module-1/part1.qmd
        - module-1/part2.qmd
        - module-1/part3.qmd
        - module-1/part4.qmd
        - module-1/part5.qmd
        - module-1/part6.qmd
    - part: "Module 2: Centering & Between/Within Effects"
      chapters:
        - module-2/intro.qmd
        - module-2/part1.qmd
        - module-2/part2.qmd
        - module-2/part3.qmd
    - part: "Module 3: Inferential Threats & Identification"
      chapters:
        - module-3/intro.qmd
        - module-3/part1.qmd
        - module-3/part2.qmd
        - module-3/part3.qmd
        - module-3/part4.qmd
        - module-3/part5.qmd
        - module-3/part6.qmd
    - part: "Module 4: Longitudinal Data & Change"
