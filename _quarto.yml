        - module-4/part5.qmd
        - module-4/part6.qmd
        - module-4/part7.qmd
        - module-4/part8.qmd
        - module-4/part9.qmd
        - module-4/part10.qmd
    - part: "Module 5: Experimental Designs with Nesting"
      chapters:
        - module-5/intro.qmd
        - module-5/part1.qmd
        - module-5/part2.qmd
        - module-5/part3.qmd
        - module-5/part4.qmd
        - module-5/part5.qmd
        - module-5/part6.qmd
        - module-5/part7.qmd
        - module-5/part8.qmd
