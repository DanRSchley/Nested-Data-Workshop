format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    toc-depth: 3
    number-sections: true
    code-fold: true
    code-tools:
      source: false
      toggle: true
      caption: "Show/Hide All Code"
    highlight-style: github
    df-print: kable

execute:
  warning: false
  message: false
  freeze: auto
